project_id = "context-bubble"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["contextbubble://auth/callback", "http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[functions.api]
verify_jwt = false

[functions.mcp-server]
verify_jwt = false
